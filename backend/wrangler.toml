name = "aiimin-backend"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"

# Note: Secrets should be added via 'wrangler secret put' or in dashboard
# SUPABASE_URL = "..."
# SUPABASE_SERVICE_ROLE_KEY = "..."

[triggers]
crons = ["0 0 * * *"] # Run correlation job nightly at midnight UTC
