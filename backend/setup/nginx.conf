# AIIMIN — Nginx Reverse Proxy Config
# Proxies api.aiimin.in → localhost:3000 (PM2/Node)
# SSL: Let's Encrypt (Certbot fills the cert paths)
#
# Deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/aiimin-api
#   sudo ln -sf /etc/nginx/sites-available/aiimin-api /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream aiimin_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.aiimin.in;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aiimin.in;

    # SSL — Certbot fills these
    ssl_certificate     /etc/letsencrypt/live/api.aiimin.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aiimin.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/aiimin-api-access.log;
    error_log  /var/log/nginx/aiimin-api-error.log;

    # Timeouts
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # Rate limit — extra layer on top of Express rate-limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    location / {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://aiimin_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection      "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Body size limit — 5MB max (for resume uploads)
        client_max_body_size 5m;
    }

    # Block common exploit paths
    location ~ /\. {
        deny all;
    }
}
