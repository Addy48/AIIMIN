<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" width="1120" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0C"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16161A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#101013" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="chart-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E664A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2E664A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="700" fill="url(#bg)" rx="14" />
  
  <!-- Header -->
  <text x="64" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#EDE4D3">Patterns</text>
  <text x="64" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#888892">Week of 23-29 June</text>

  <!-- Main Chart Area -->
  <g transform="translate(64, 150)">
    <rect width="700" height="340" rx="16" fill="url(#card-bg)" stroke="#1A1A1E" stroke-width="1" />
    
    <!-- Grid Lines -->
    <line x1="40" y1="60" x2="660" y2="60" stroke="#1A1A1E" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="40" y1="130" x2="660" y2="130" stroke="#1A1A1E" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="40" y1="200" x2="660" y2="200" stroke="#1A1A1E" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="40" y1="270" x2="660" y2="270" stroke="#1A1A1E" stroke-width="1" stroke-dasharray="4 4" />

    <!-- Chart Path 1 (Focus) -->
    <path d="M 60 220 C 120 180, 180 150, 260 180 C 340 210, 420 110, 500 130 C 580 150, 640 90, 640 90 L 640 270 L 60 270 Z" fill="url(#chart-fade)" />
    <path d="M 60 220 C 120 180, 180 150, 260 180 C 340 210, 420 110, 500 130 C 580 150, 640 90, 640 90" fill="none" stroke="#2E664A" stroke-width="3" stroke-linecap="round" />
    <circle cx="640" cy="90" r="5" fill="#EDE4D3" stroke="#2E664A" stroke-width="2" />

    <!-- Chart Path 2 (Sleep) -->
    <path d="M 60 160 C 120 140, 180 190, 260 160 C 340 130, 420 220, 500 190 C 580 160, 640 140, 640 140" fill="none" stroke="#1A3A2A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4" />

    <!-- Chart Path 3 (Mood) -->
    <path d="M 60 250 C 120 230, 180 260, 260 210 C 340 160, 420 180, 500 120 C 580 60, 640 100, 640 100" fill="none" stroke="#24513B" stroke-width="2" stroke-linecap="round" />

    <!-- X-Axis Labels -->
    <text x="60" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888892" text-anchor="middle">MON</text>
    <text x="156" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888892" text-anchor="middle">TUE</text>
    <text x="252" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888892" text-anchor="middle">WED</text>
    <text x="348" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888892" text-anchor="middle">THU</text>
    <text x="444" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888892" text-anchor="middle">FRI</text>
    <text x="540" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#888892" text-anchor="middle">SAT</text>
    <text x="640" y="300" font-family="'JetBrains Mono', monospace" font-size="12" fill="#EDE4D3" font-weight="700" text-anchor="middle">SUN</text>

    <!-- Legend -->
    <circle cx="520" cy="32" r="4" fill="#2E664A" />
    <text x="532" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888892">Focus</text>
    <circle cx="580" cy="32" r="4" fill="#1A3A2A" />
    <text x="592" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888892">Sleep</text>
    <circle cx="640" cy="32" r="4" fill="#24513B" />
    <text x="652" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888892">Mood</text>
  </g>

  <!-- Right Side: Weekly Summary -->
  <g transform="translate(790, 150)">
    <rect width="266" height="340" rx="16" fill="url(#card-bg)" stroke="#1A1A1E" stroke-width="1" />
    <text x="24" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#EDE4D3">Weekly Summary</text>
    
    <text x="24" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888892">Consistency</text>
    <text x="24" y="126" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="#EDE4D3">+17% </text>

    <line x1="24" y1="160" x2="242" y2="160" stroke="#1A1A1E" stroke-width="1" />

    <text x="24" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888892">Best Day</text>
    <text x="24" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#EDE4D3">Wednesday</text>

    <line x1="24" y1="260" x2="242" y2="260" stroke="#1A1A1E" stroke-width="1" />

    <text x="24" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888892">Current Streak</text>
    <text x="24" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#EDE4D3">12 Days</text>
  </g>

  <!-- Correlation Insights (Bottom) -->
  <g transform="translate(64, 520)">
    <!-- Insight 1 -->
    <g transform="translate(0, 0)">
      <rect width="314" height="110" rx="16" fill="url(#card-bg)" stroke="#1A1A1E" stroke-width="1" />
      <text x="24" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888892" font-weight="500">Insight found</text>
      <text x="24" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#EDE4D3" font-weight="500">Sleep &gt; 7h --&gt; Focus </text>
      <path d="M 270 56 L 282 44 L 294 56" fill="none" stroke="#2E664A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <line x1="282" y1="44" x2="282" y2="68" stroke="#2E664A" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Insight 2 -->
    <g transform="translate(338, 0)">
      <rect width="314" height="110" rx="16" fill="url(#card-bg)" stroke="#1A1A1E" stroke-width="1" />
      <text x="24" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888892" font-weight="500">Insight found</text>
      <text x="24" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#EDE4D3" font-weight="500">Gym days --&gt; Mood </text>
      <path d="M 270 56 L 282 44 L 294 56" fill="none" stroke="#2E664A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <line x1="282" y1="44" x2="282" y2="68" stroke="#2E664A" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- Insight 3 -->
    <g transform="translate(676, 0)">
      <rect width="314" height="110" rx="16" fill="url(#card-bg)" stroke="#1A1A1E" stroke-width="1" />
      <text x="24" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888892" font-weight="500">Insight found</text>
      <text x="24" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#EDE4D3" font-weight="500">Screen &lt; 2h --&gt; Sleep </text>
      <path d="M 270 56 L 282 44 L 294 56" fill="none" stroke="#2E664A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <line x1="282" y1="44" x2="282" y2="68" stroke="#2E664A" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>
</svg>
