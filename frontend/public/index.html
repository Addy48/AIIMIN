<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- Favicon and Preload -->
  <link rel="preload" href="/src/assets/logo-symbol.svg" as="image" type="image/svg+xml">
  <link rel="icon" href="/favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon-32.png" sizes="32x32">

  <!-- Viewport & theme -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5a623" />
  <meta name="color-scheme" content="dark light" />

  <!-- Primary Meta Tags -->
  <title>AIIMIN - Dashboard</title>
  <meta name="title" content="AIIMIN - Dashboard" />
  <meta name="description"
    content="AIIMIN is a calm, high-clarity personal dashboard for daily accountability, behavioral insights, and long-term habit tracking. Your life OS." />
  <meta name="keywords"
    content="productivity, habit tracker, daily log, behavioral insights, focus timer, life operating system, AIIMIN" />
  <meta name="author" content="AIIMIN" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://aiimin.app/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aiimin.app/" />
  <meta property="og:title" content="AIIMIN — Personal Life Operating System" />
  <meta property="og:description"
    content="A calm, high-clarity dashboard for daily accountability, behavioral insights, and long-term habit tracking." />
  <meta property="og:image" content="https://aiimin.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="AIIMIN" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://aiimin.app/" />
  <meta name="twitter:title" content="AIIMIN — Personal Life Operating System" />
  <meta name="twitter:description"
    content="A calm, high-clarity dashboard for daily accountability, behavioral insights, and long-term habit tracking." />
  <meta name="twitter:image" content="https://aiimin.app/og-image.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Google Identity Services (for OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Structured Data — Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "AIIMIN",
    "description": "A personal life operating system for daily accountability and behavioral insights.",
    "url": "https://aiimin.app",
    "applicationCategory": "ProductivityApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "AIIMIN",
      "url": "https://aiimin.app"
    }
  }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      background-color: #0e100d;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }

    html {
      scroll-padding-top: 52px;
    }

    nav {
      z-index: 99999 !important;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run AIIMIN.</noscript>
  <div id="root"></div>
</body>

</html>
