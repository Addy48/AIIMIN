<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- Favicon and Preload -->
  <link rel="preload" href="/AIIMIN_logo.svg" as="image" type="image/svg+xml">
  <link rel="icon" href="/favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon-light.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/logo-symbol.svg" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Viewport & theme -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#D4AF37" />
  <meta name="color-scheme" content="dark light" />

  <!-- Primary Meta Tags -->
  <title>AIIMIN — Personal Life OS | Join the Waitlist</title>
  <meta name="title" content="AIIMIN — Personal Life OS | Join the Waitlist" />
  <meta name="description"
    content="AIIMIN is a data-dense personal dashboard for Indian students and young professionals. Track habits, money, focus, and mood in one screen. Join the waitlist — launching September 2026." />
  <meta name="keywords"
    content="productivity, habit tracker, daily log, behavioral insights, focus timer, life operating system, AIIMIN" />
  <meta name="author" content="AIIMIN" />
  <meta name="robots" content="index, follow" />

  <!-- ============================================================ -->
  <!-- ⚠️  DO NOT REMOVE — GOOGLE SEARCH CONSOLE DOMAIN VERIFICATION -->
  <!-- This tag proves ownership of aiimin.in to Google.            -->
  <!-- Removing it will break Google OAuth branding verification    -->
  <!-- and may revoke the app's ability to use Google Sign-In.      -->
  <!-- PERMANENT — must stay in index.html at all times.            -->
  <!-- ============================================================ -->
  <meta name="google-site-verification" content="vhLAVNQErtH_7QQihSvHyG2jouLwYpJOPlpWRuoVxU0" />
  <!-- ============================================================ -->

  <!-- Canonical -->
  <link rel="canonical" href="https://aiimin.in/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aiimin.in/" />
  <meta property="og:title" content="AIIMIN — Your Life OS for ₹0 to ₹99/mo" />
  <meta property="og:description"
    content="Track habits, money, focus, and mood. One dashboard. Built for Indian students. Join the founding waitlist." />
  <meta property="og:image" content="https://aiimin.in/og-image-v2.svg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="AIIMIN" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://aiimin.in/" />
  <meta name="twitter:title" content="AIIMIN — Your Life OS for ₹0 to ₹99/mo" />
  <meta name="twitter:description"
    content="Track habits, money, focus, and mood. One dashboard. Built for Indian students. Join the founding waitlist." />
  <meta name="twitter:image" content="https://aiimin.in/og-image-v2.svg" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Typography: Familjen Grotesk (display) + Figtree (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link
    href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Google Identity Services (for OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- SheetJS for Excel Processing -->
  <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>

  <!-- Structured Data — Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "AIIMIN",
    "description": "A data-dense personal dashboard for daily accountability, behavioral insights, money tracking, and habit building. Built for Indian students and early professionals.",
    "url": "https://aiimin.in",
    "applicationCategory": "ProductivityApplication",
    "operatingSystem": "Desktop Web",
    "offers": {
      "@type": "AggregateOffer",
      "lowPrice": "0",
      "highPrice": "99",
      "priceCurrency": "INR",
      "offerCount": "4"
    },
    "audience": {
      "@type": "EducationalAudience",
      "educationalRole": "student",
      "geographicArea": {
        "@type": "Country",
        "name": "India"
      }
    },
    "author": {
      "@type": "Organization",
      "name": "AIIMIN",
      "url": "https://aiimin.in"
    }
  }
  </script>


  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      background-color: var(--color-base, #050505);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      letter-spacing: -0.01em;
    }

    html {
      scroll-padding-top: 80px;
      /* floating pill nav offset */
    }

    nav {
      z-index: 99999 !important;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run AIIMIN.</noscript>
  <div id="root"></div>
</body>

</html>
