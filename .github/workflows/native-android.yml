name: Native Android

on:
  push:
    branches: [main]
    paths:
      - 'native-android/**'
      - '.github/workflows/native-android.yml'
  pull_request:
    paths:
      - 'native-android/**'
      - '.github/workflows/native-android.yml'
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Also build signed release APK (needs repo secrets)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: native-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aiimin-native-debug
          path: native-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  assemble-release-unsigned:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: assemble-debug
    defaults:
      run:
        working-directory: native-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble release APK (unsigned — debug keystore fallback)
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: aiimin-native-release-unsigned
          path: native-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  assemble-release:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: assemble-debug
    defaults:
      run:
        working-directory: native-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret missing"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/native-android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: aiimin-native-release
          path: native-android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
