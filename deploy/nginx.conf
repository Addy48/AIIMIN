# AIIMIN API — Nginx reverse proxy for api.aiimin.in → localhost:3001

upstream aiimin_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.aiimin.in;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aiimin.in;

    # Certbot manages these paths after first run
    ssl_certificate /etc/letsencrypt/live/api.aiimin.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aiimin.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    access_log /var/log/nginx/aiimin-api-access.log;
    error_log /var/log/nginx/aiimin-api-error.log;

    location / {
        proxy_pass http://aiimin_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
